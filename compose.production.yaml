services:
  backend:
    image: "quoteflow-backend:${QUOTEFLOW_IMAGE_TAG:?Set QUOTEFLOW_IMAGE_TAG to the reviewed git SHA}"
    build:
      context: ./backend
    environment:
      QUOTEFLOW_CORS_ALLOW_ORIGINS: "${QUOTEFLOW_CORS_ALLOW_ORIGINS:?Set the exact production HTTPS origin}"
      QUOTEFLOW_REQUEST_SIZE_LIMIT_BYTES: "${QUOTEFLOW_REQUEST_SIZE_LIMIT_BYTES:-262144}"
    expose:
      - "8000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 768m
    memswap_limit: 1g
    cpus: "1.00"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)); raise SystemExit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - application

  frontend:
    image: "quoteflow-frontend:${QUOTEFLOW_IMAGE_TAG:?Set QUOTEFLOW_IMAGE_TAG to the reviewed git SHA}"
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${QUOTEFLOW_FRONTEND_BIND:?Set loopback bind, for example 127.0.0.1:8081}:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m,mode=0755
      - /var/run:size=1m,mode=0755
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: 256m
    memswap_limit: 384m
    cpus: "0.50"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:8080/ || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - application

networks:
  application:
    driver: bridge
