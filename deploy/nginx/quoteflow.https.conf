# Final vhost. Install only after Certbot created the referenced certificate.
limit_req_zone $binary_remote_addr zone=quoteflow_api_per_ip:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=quoteflow_pdf_per_ip:10m rate=1r/s;

server {
    listen 80;
    listen [::]:80;
    server_name quoteflow.stalarvision.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name quoteflow.stalarvision.ru;

    ssl_certificate /etc/letsencrypt/live/quoteflow.stalarvision.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quoteflow.stalarvision.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;
    client_max_body_size 300k;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'" always;

    error_page 429 = @rate_limited;

    location = /api/v1/documents/pdf {
        limit_req zone=quoteflow_pdf_per_ip burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /api/ {
        limit_req zone=quoteflow_api_per_ip burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location @rate_limited {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header X-Request-ID $request_id always;
        return 429 '{"requestId":"$request_id","error":{"code":"RATE_LIMITED","message":"Too many requests","fields":[]}}';
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
