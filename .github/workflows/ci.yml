name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Setup Node
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Test frontend
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Setup Python
        # actions/setup-python v6.3.0
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"
      - name: Install backend with test extras
        working-directory: backend
        run: |
          python -m pip install --upgrade pip build wheel
          python -m pip install -e ".[test]"
      - name: Test backend
        working-directory: backend
        run: python -m pytest
      - name: Import backend app
        working-directory: backend
        run: python -c "from app.main import app; print(app.title)"
      - name: Build backend wheel
        working-directory: backend
        run: python -m build --wheel --outdir dist
      - name: Verify wheel font assets
        working-directory: backend
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = sorted(Path("dist").glob("quoteflow_backend-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected one backend wheel, found {len(wheels)}")
          names = set(ZipFile(wheels[0]).namelist())
          required = {
              "app/assets/fonts/DejaVuSans.ttf",
              "app/assets/fonts/DejaVuSans-Bold.ttf",
              "app/assets/fonts/LICENSE",
          }
          missing = required - names
          if missing:
              raise SystemExit(f"Missing wheel assets: {sorted(missing)}")
          PY

  docker:
    name: Docker
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Validate local Compose config
        run: docker compose config --quiet
      - name: Validate production Compose config
        run: docker compose --env-file .env.production.example -f compose.production.yaml config --quiet
      - name: Build production Compose images
        run: docker compose --env-file .env.production.example -f compose.production.yaml build --pull
      - name: Smoke production Compose boundary
        env:
          COMPOSE_PROJECT_NAME: quoteflow-ci-${{ github.run_id }}
        run: |
          set -euo pipefail
          cleanup() {
            docker compose --env-file .env.production.example -f compose.production.yaml down --remove-orphans
          }
          trap cleanup EXIT
          docker compose --env-file .env.production.example -f compose.production.yaml up -d --wait
          curl --fail --silent --show-error http://127.0.0.1:8081/ >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:8081/api/health
          if docker compose --env-file .env.production.example -f compose.production.yaml port backend 8000 2>/dev/null | grep -q .; then
            echo "Backend port must not be published on the host" >&2
            exit 1
          fi
