name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Setup Node
        # actions/setup-node v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Test frontend
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Setup Python
        # actions/setup-python v6.3.0
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"
      - name: Install backend with test extras
        working-directory: backend
        run: |
          python -m pip install --upgrade pip build wheel
          python -m pip install -e ".[test]"
      - name: Test backend
        working-directory: backend
        run: python -m pytest
      - name: Import backend app
        working-directory: backend
        run: python -c "from app.main import app; print(app.title)"
      - name: Build backend wheel
        working-directory: backend
        run: python -m build --wheel --outdir dist
      - name: Verify wheel font assets
        working-directory: backend
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = sorted(Path("dist").glob("quoteflow_backend-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected one backend wheel, found {len(wheels)}")
          names = set(ZipFile(wheels[0]).namelist())
          required = {
              "app/assets/fonts/DejaVuSans.ttf",
              "app/assets/fonts/DejaVuSans-Bold.ttf",
              "app/assets/fonts/LICENSE",
          }
          missing = required - names
          if missing:
              raise SystemExit(f"Missing wheel assets: {sorted(missing)}")
          PY

  docker:
    name: Docker
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Validate local Compose config
        run: docker compose config --quiet
      - name: Validate production Compose config
        run: |
          docker compose --env-file .env.production.example -f compose.production.yaml config --quiet
          docker compose --env-file .env.production.example -f compose.production.yaml config
      - name: Build production Compose images
        run: docker compose --env-file .env.production.example -f compose.production.yaml build --pull
      - name: Validate external Nginx configurations
        run: |
          set -euo pipefail
          tls_root="$(mktemp -d)"
          cleanup() {
            rm -rf "$tls_root"
          }
          trap cleanup EXIT
          mkdir -p "$tls_root/live/quoteflow.stalarvision.ru"
          openssl req -x509 -nodes -newkey rsa:2048             -keyout "$tls_root/live/quoteflow.stalarvision.ru/privkey.pem"             -out "$tls_root/live/quoteflow.stalarvision.ru/fullchain.pem"             -days 1 -subj "/CN=quoteflow.stalarvision.ru" >/dev/null 2>&1
          openssl dhparam -dsaparam -out "$tls_root/ssl-dhparams.pem" 2048 >/dev/null 2>&1
          printf '%s\n' 'ssl_protocols TLSv1.2 TLSv1.3;' > "$tls_root/options-ssl-nginx.conf"
          chmod -R a+rX "$tls_root"
          docker run --rm             -v "$PWD/deploy/nginx/quoteflow.http.conf:/etc/nginx/conf.d/default.conf:ro"             quoteflow-frontend:replace-with-reviewed-git-sha nginx -t
          docker run --rm             -v "$PWD/deploy/nginx/quoteflow.https.conf:/etc/nginx/conf.d/default.conf:ro"             -v "$tls_root:/etc/letsencrypt:ro"             quoteflow-frontend:replace-with-reviewed-git-sha nginx -t
      - name: Review final image history
        run: |
          set -euo pipefail
          secret_pattern='AKIA[0-9A-Z]{16}|gh[pousr]_[A-Za-z0-9_]{20,}|-----BEGIN [A-Z ]*PRIVATE KEY-----|AIza[0-9A-Za-z_-]{35}|sk-[A-Za-z0-9]{20,}'
          for image in             quoteflow-backend:replace-with-reviewed-git-sha             quoteflow-frontend:replace-with-reviewed-git-sha
          do
            history_file="$(mktemp)"
            docker history --no-trunc --format '{{.CreatedBy}}' "$image" | tee "$history_file"
            if grep -E "$secret_pattern" "$history_file"; then
              echo "Potential secret material found in image history for $image" >&2
              exit 1
            fi
            rm -f "$history_file"
          done
      - name: Scan backend runtime image
        id: scan-backend
        continue-on-error: true
        # aquasecurity/trivy-action v0.35.0 (Trivy v0.69.3)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: quoteflow-backend:replace-with-reviewed-git-sha
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          format: json
          output: trivy-backend.json
          exit-code: "0"
      - name: Scan frontend runtime image
        id: scan-frontend
        continue-on-error: true
        # aquasecurity/trivy-action v0.35.0 (Trivy v0.69.3)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: quoteflow-frontend:replace-with-reviewed-git-sha
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          format: json
          output: trivy-frontend.json
          exit-code: "0"
      - name: Report and enforce runtime vulnerability gate
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          findings = []
          for service in ("backend", "frontend"):
              report_path = Path(f"trivy-{service}.json")
              if not report_path.exists():
                  raise SystemExit(f"Missing Trivy report: {report_path}")
              report = json.loads(report_path.read_text())
              for result in report.get("Results") or []:
                  target = result.get("Target", "")
                  for vulnerability in result.get("Vulnerabilities") or []:
                      findings.append(
                          {
                              "service": service,
                              "target": target,
                              "package": vulnerability.get("PkgName", ""),
                              "id": vulnerability.get("VulnerabilityID", ""),
                              "severity": vulnerability.get("Severity", ""),
                              "status": vulnerability.get("Status", ""),
                              "installed": vulnerability.get("InstalledVersion", ""),
                              "fixed": vulnerability.get("FixedVersion", ""),
                              "title": vulnerability.get("Title", ""),
                          }
                      )

          order = {"CRITICAL": 0, "HIGH": 1}
          findings.sort(
              key=lambda item: (
                  order.get(item["severity"], 9),
                  item["service"],
                  item["id"],
                  item["package"],
                  item["target"],
              )
          )
          print(
              "service\tseverity\tvulnerability\tpackage\tinstalled\tfixed"
              "\tstatus\ttarget\ttitle"
          )
          for item in findings:
              print(
                  "\t".join(
                      item[key].replace("\t", " ").replace("\n", " ")
                      for key in (
                          "service",
                          "severity",
                          "id",
                          "package",
                          "installed",
                          "fixed",
                          "status",
                          "target",
                          "title",
                      )
                  )
              )
          counts = {
              severity: sum(item["severity"] == severity for item in findings)
              for severity in ("CRITICAL", "HIGH")
          }
          print(f"Runtime vulnerability totals: {counts}")
          if findings:
              raise SystemExit("HIGH/CRITICAL runtime vulnerabilities remain")
          PY
      - name: Smoke production Compose boundary
        env:
          COMPOSE_PROJECT_NAME: quoteflow-ci-${{ github.run_id }}
        run: |
          set -euo pipefail
          cleanup() {
            docker compose --env-file .env.production.example -f compose.production.yaml down --remove-orphans
          }
          trap cleanup EXIT
          docker compose --env-file .env.production.example -f compose.production.yaml up -d --wait
          curl --fail --silent --show-error http://127.0.0.1:8081/ >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:8081/api/health
          backend_id="$(docker compose --env-file .env.production.example -f compose.production.yaml ps -q backend)"
          frontend_id="$(docker compose --env-file .env.production.example -f compose.production.yaml ps -q frontend)"
          python - "$backend_id" "$frontend_id" <<'PY'
          import json
          import subprocess
          import sys

          def inspect(container_id: str) -> dict:
              return json.loads(
                  subprocess.check_output(
                      ["docker", "inspect", container_id], text=True
                  )
              )[0]

          def require(condition: bool, message: str) -> None:
              if not condition:
                  raise SystemExit(message)

          backend = inspect(sys.argv[1])
          frontend = inspect(sys.argv[2])

          expected_frontend_binding = [
              {"HostIp": "127.0.0.1", "HostPort": "8081"}
          ]
          require(
              backend["HostConfig"]["PortBindings"] == {},
              "Backend must not publish a host port",
          )
          require(
              frontend["NetworkSettings"]["Ports"].get("8080/tcp")
              == expected_frontend_binding,
              "Frontend 8080/tcp must bind only to 127.0.0.1:8081",
          )

          expected = {
              "backend": {
                  "container": backend,
                  "user": "quoteflow",
                  "memory": 768 * 1024 * 1024,
                  "memory_swap": 1024 * 1024 * 1024,
                  "nano_cpus": 1_000_000_000,
                  "pids": 128,
                  "tmpfs": {"/tmp"},
              },
              "frontend": {
                  "container": frontend,
                  "user": "101",
                  "memory": 256 * 1024 * 1024,
                  "memory_swap": 384 * 1024 * 1024,
                  "nano_cpus": 500_000_000,
                  "pids": 64,
                  "tmpfs": {"/tmp", "/var/cache/nginx", "/var/run"},
              },
          }
          for service, values in expected.items():
              container = values["container"]
              host = container["HostConfig"]
              require(
                  container["Config"]["User"] == values["user"],
                  f"{service}: unexpected runtime user {container['Config']['User']!r}",
              )
              require(host["ReadonlyRootfs"] is True, f"{service}: rootfs is writable")
              require(host["Privileged"] is False, f"{service}: privileged mode enabled")
              require(host["Binds"] in (None, []), f"{service}: bind mounts present")
              require(host["Mounts"] in (None, []), f"{service}: managed mounts present")
              require(
                  set((host["Tmpfs"] or {}).keys()) == values["tmpfs"],
                  f"{service}: unexpected tmpfs paths {host['Tmpfs']!r}",
              )
              require(host["CapDrop"] == ["ALL"], f"{service}: capabilities not dropped")
              require(
                  "no-new-privileges:true" in (host["SecurityOpt"] or []),
                  f"{service}: no-new-privileges missing",
              )
              require(host["PidsLimit"] == values["pids"], f"{service}: PID limit mismatch")
              require(host["Memory"] == values["memory"], f"{service}: memory limit mismatch")
              require(
                  host["MemorySwap"] == values["memory_swap"],
                  f"{service}: memory+swap limit mismatch",
              )
              require(host["NanoCpus"] == values["nano_cpus"], f"{service}: CPU limit mismatch")
              require(
                  container["Config"].get("Healthcheck", {}).get("Test"),
                  f"{service}: healthcheck missing",
              )
              require(
                  host["LogConfig"]["Type"] == "json-file"
                  and host["LogConfig"]["Config"]
                  == {"max-file": "3", "max-size": "10m"},
                  f"{service}: bounded json-file logging mismatch",
              )
              require(
                  host["RestartPolicy"]["Name"] == "unless-stopped",
                  f"{service}: restart policy mismatch",
              )

          print("Production runtime metadata verified")
          PY
